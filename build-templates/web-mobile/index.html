<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="utf-8">
    <title>%COCOS_WINDOW_TITLE%</title>

    <!-- Favicon & PWA icons -->
    <link rel="icon" href="./public/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="./public/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./public/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./public/favicon-16x16.png">
    <link rel="manifest" href="./nexus.json">
    <link rel="mask-icon" href="./public/safari-pinned-tab.svg" color="#5bbad5">
    <meta name="theme-color" content="#5bbad5">
    <meta name="msapplication-TileColor" content="#da532c">

    <!-- Mobile / viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">

    <!-- Browser & rendering hacks -->
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="x5-page-mode" content="app">
    <meta name="full-screen" content="yes">
    <meta name="x5-fullscreen" content="true">
    <meta name="360-fullscreen" content="true">

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="game.css">

    %COCOS_STYLE%
</head>

<body>

    <header id="logo">
        <img src="./public/nexus.png" alt="NEXUS Logo">
    </header>

    <div id="loadingMsg">正在啟動遊戲系統...</div>

    <!-- 自訂進度條 (與 ATG 結構融合) -->
    <div class="progress-container" id="boot-container">
        <div class="progress-fill" id="boot-progress"></div>
    </div>

    <section id="orientation">
        <div class="icon"></div>
    </section>

    <div class="blur" id="ui-blur"></div>

    <section id="swipe">
        <div class="swipe"></div>
        <div class="fullscreen-icon"></div>
    </section>

    <main id="GameWrapper">
        <div id="GameDiv" cc_exact_fit_screen="true">
            <div id="Cocos3dGameContainer">
                <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99"></canvas>
            </div>
        </div>
        <div id="version">v0.1.0</div>
    </main>

    <!-- 初始化觸控事件 hack (PC觸控螢幕) -->
    <script>
        if (!('ontouchstart' in document.documentElement)) {
            document.documentElement.ontouchstart = () => {};
        }

        // 監聽 Cocos 畫布右鍵 (雖然在新版本結構中已在標籤內處理，但保持 JS 保險)
        const canvas = document.getElementById('GameCanvas');
        if (canvas) {
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }
    </script>

    <!-- 平台邏輯 -->
    <script src="./app.js"></script>

    <!-- Cocos Creator 腳本入口：會展開為 Polyfills, SystemJS, Import Map 與 index.js 載入邏輯 -->
    %COCOS_SCRIPT%

    <!-- 進度模擬與準備邏輯 -->
    <script>
        (function() {
            var fill = document.getElementById('boot-progress');
            var hint = document.getElementById('loadingMsg');
            var logo = document.getElementById('logo');
            var container = document.getElementById('boot-container');
            
            var hints = ['正在初始化核心模組...', '載入語系資源...', '建立渲染管線...', '即將進入遊戲...'];
            var progress = 0;
            var hintIdx = 0;

            var iv = setInterval(function() {
                var increment = progress < 80 ? Math.random() * 4 + 1 : Math.random() * 0.5;
                progress = Math.min(progress + increment, 95);
                if (fill) fill.style.width = progress + '%';

                var newIdx = Math.floor(progress / 25);
                if (newIdx > hintIdx && newIdx < hints.length) {
                    hintIdx = newIdx;
                    if (hint) hint.textContent = hints[hintIdx];
                }

                if (progress >= 95) clearInterval(iv);
            }, 120);

            // Cocos 完成載入的回調
            var origOnCocosReady = window.__onCocosReady;
            window.__onCocosReady = function() {
                clearInterval(iv);
                if (fill) fill.style.width = '100%';
                if (hint) hint.textContent = '載入完成';

                setTimeout(function() {
                    // 淡出特效
                    var layers = [logo, hint, container];
                    layers.forEach(function(el) {
                        if (el) {
                            el.style.transition = 'opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
                            el.style.opacity = '0';
                            el.style.pointerEvents = 'none';
                        }
                    });
                    
                    setTimeout(function() {
                        layers.forEach(function(el) { if (el) el.style.display = 'none'; });
                        if(origOnCocosReady) origOnCocosReady();
                    }, 650);
                }, 300);
            };
        })();
    </script>

</body>
</html>
